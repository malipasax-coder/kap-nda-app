<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2Social | ULTIMATE VIP v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #b71c1c; --blue: #0095f6; --bg: #fafafa; --border: #dbdbdb; --gold: #f1c40f; --green: #27ae60; --dark: #121212; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 70px; overflow-x: hidden; color: #262626; }
        .hidden { display: none !important; }

        /* HEADER & NAV */
        header { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 20px; position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); font-style: italic; letter-spacing: -1px; cursor:pointer; }
        .container { max-width: 500px; margin: 70px auto 0; padding: 10px 15px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-btn { cursor: pointer; font-size: 24px; color: #888; transition: 0.3s; }
        .active-nav { color: var(--primary); transform: scale(1.2); }

        /* POST & VIP DESIGN */
        .post { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; position: relative; }
        .boosted { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .vip-username { color: #d4af37; text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); font-weight: 800; }
        .verified-badge { color: var(--blue); margin-left: 4px; font-size: 14px; }
        .guild-tag { background: var(--dark); color: var(--gold); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; border: 1px solid var(--gold); margin-left: 5px; }
        
        .post-img-container { position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; aspect-ratio: 1/1; }
        .post-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { position: absolute; top: 15px; right: 15px; background: var(--gold); color: #000; padding: 6px 12px; border-radius: 20px; font-weight: 800; border: 2px solid #fff; z-index: 10; }

        /* INTERACTION */
        .post-actions { display: flex; gap: 15px; padding: 12px; font-size: 22px; }
        .action-btn { cursor: pointer; transition: transform 0.2s; }
        .action-btn:active { transform: scale(1.4); }
        .comment-box { padding: 10px; border-top: 1px solid #f0f0f0; font-size: 13px; max-height: 100px; overflow-y: auto; }

        /* GRID / KESFET */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #fff; }
        .grid-item { aspect-ratio: 1/1; background-size: cover; background-position: center; cursor: pointer; transition: opacity 0.2s; }
        .grid-item:hover { opacity: 0.8; }

        /* CHAT */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #fff; z-index: 2000; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .chat-body { flex: 1; padding: 20px; background: #f0f2f5; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .bubble.right { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.left { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }

        .btn-prime { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
    </style>
</head>
<body>

    <section id="auth-screen">
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--dark);">
            <div class="auth-card" style="background:white; padding:40px; border-radius:20px; width:350px; text-align:center;">
                <h1 style="color:var(--primary); font-style:italic; font-size:32px; margin-bottom:5px;">M2Social</h1>
                <p style="font-size:12px; color:#666; margin-bottom:20px;">Metin2 Oyuncu Topluluğu</p>
                <form id="login-form" onsubmit="event.preventDefault(); window.login();">
                    <input type="email" id="email" placeholder="E-posta" required style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="password" id="pass" placeholder="Şifre" required style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">
                    <button type="submit" class="btn-prime">Giriş Yap</button>
                    <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--blue);" onclick="window.toggleAuth()">Hesabın yok mu? Kaydol</p>
                </form>
                <form id="reg-form" class="hidden" onsubmit="event.preventDefault(); window.register();">
                    <input type="text" id="rUser" placeholder="Kullanıcı Adı" required style="width:100%; padding:12px; margin:4px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="email" id="rEmail" placeholder="E-posta" required style="width:100%; padding:12px; margin:4px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="password" id="rPass" placeholder="Şifre (Min 6)" required style="width:100%; padding:12px; margin:4px 0; border:1px solid #ddd; border-radius:8px;">
                    <button type="submit" class="btn-prime">Kayıt Ol</button>
                    <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--blue);" onclick="window.toggleAuth()">Girişe Dön</p>
                </form>
            </div>
        </div>
    </section>

    <div id="user-app" class="hidden">
        <header>
            <div class="logo" onclick="window.switchTab('home')">M2SOCIAL</div>
            <div style="display:flex; gap:15px; font-size:22px;">
                <span onclick="window.switchTab('msgs')" style="cursor:pointer;">💬</span>
                <span onclick="window.logout()" style="cursor:pointer;">🚪</span>
            </div>
        </header>

        <main id="view-home" class="container view-section">
            <div id="feed"></div>
        </main>

        <main id="view-search" class="container view-section hidden">
            <h3 style="margin-top:0;">✨ Keşfet</h3>
            <div id="search-results" class="grid"></div>
        </main>

        <main id="view-up" class="container view-section hidden">
            <div class="card">
                <h3>Post Paylaş</h3>
                <div id="drop-area" style="border:2px dashed #ccc; padding:30px; text-align:center; border-radius:15px; cursor:pointer;" onclick="document.getElementById('fileIn').click()">📸 Resim Seç</div>
                <img id="up-prev" class="hidden" style="width:100%; border-radius:10px; margin-top:10px;">
                <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="window.preview(this)">
                <textarea id="up-text" placeholder="Açıklama veya İtem Detayı..." style="width:100%; height:80px; margin-top:10px; border:1px solid #eee; padding:10px; border-radius:8px;"></textarea>
                <div style="margin:10px 0;">
                    <label><input type="checkbox" id="up-trade" onchange="document.getElementById('price-box').classList.toggle('hidden')"> 💰 Satılık İtem</label>
                </div>
                <input type="number" id="price-box" class="hidden" placeholder="Won Fiyatı" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px;">
                <button class="btn-prime" onclick="window.post()">🚀 Paylaş</button>
            </div>
        </main>

        <main id="view-msgs" class="container view-section hidden">
            <h3>Mesajlar</h3>
            <div id="msg-list" class="card" style="padding:0;"></div>
        </main>

        <main id="view-prof" class="container view-section hidden">
            <div class="card" style="text-align:center;">
                <img id="p-img" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                <h2 id="p-name" style="margin:10px 0 5px;">...</h2>
                <div id="p-guild"></div>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
                    <div><b id="p-post-count">0</b><br><small>Post</small></div>
                    <div><b id="p-balance">₺0.00</b><br><small>Bakiye</small></div>
                </div>
                <button class="btn-prime" style="background:var(--gold); color:black;" onclick="window.joinG()">🛡️ LONCA DEĞİŞTİR</button>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-btn active-nav" onclick="window.switchTab('home', this)">🏠</div>
            <div class="nav-btn" onclick="window.switchTab('search', this)">✨</div>
            <div class="nav-btn" onclick="window.switchTab('up', this)">➕</div>
            <div class="nav-btn" onclick="window.switchTab('prof', this)">👤</div>
        </nav>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <span onclick="window.closeChat()" style="cursor:pointer; font-size:24px;">←</span>
            <div id="chat-target">...</div>
        </div>
        <div id="chat-msgs" class="chat-body"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#fff; border-top:1px solid #eee;">
            <input type="text" id="chatIn" placeholder="Mesaj yaz..." style="flex:1; padding:12px; border-radius:20px; border:1px solid #ddd; outline:none;">
            <button onclick="window.sendChat()" style="color:var(--blue); border:none; background:none; font-weight:bold; cursor:pointer;">GÖNDER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIG (Kendi bilgilerinle değiştirilmelidir)
        const firebaseConfig = {
            apiKey: "AIzaSyBWSlha9fD_q3zHXaRJ3ocJdtALqkrW-LU",
            authDomain: "kapinda-8d3ef.firebaseapp.com",
            projectId: "kapinda-8d3ef",
            storageBucket: "kapinda-8d3ef.firebasestorage.app",
            messagingSenderId: "246456710881",
            appId: "1:246456710881:web:1d27f666a6c0dab01829a0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curImg = ""; 
        let chatRef = "";

        // UI HELPERS
        window.toggleAuth = () => { document.getElementById('login-form').classList.toggle('hidden'); document.getElementById('reg-form').classList.toggle('hidden'); };
        
        window.switchTab = (t, e) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            if(e) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
                e.classList.add('active-nav');
            }
        };

        // RESİM SIKIŞTIRMA (Firestore 1MB limitini aşmamak için)
        window.preview = (i) => {
            if(i.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, width, height);
                        curImg = canvas.toDataURL("image/jpeg", 0.7);
                        document.getElementById('up-prev').src = curImg;
                        document.getElementById('up-prev').classList.remove('hidden');
                        document.getElementById('drop-area').classList.add('hidden');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(i.files[0]);
            }
        };

        // AUTH ACTIONS
        window.login = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { alert("Hatalı Giriş!"); }
        };

        window.register = async () => {
            const u = document.getElementById('rUser').value, e = document.getElementById('rEmail').value, p = document.getElementById('rPass').value;
            try { 
                const res = await createUserWithEmailAndPassword(auth, e, p); 
                await updateProfile(res.user, { displayName: u });
                await setDoc(doc(db, "users", res.user.uid), { username: u, balance: 0, guild: "", isVerified: false });
                location.reload();
            } catch(err) { alert(err.message); }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        // STATE LISTENER
        onAuthStateChanged(auth, (u) => {
            if(u) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('user-app').classList.remove('hidden');
                loadProfile(u.uid);
                listenFeed();
                listenMessages();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('user-app').classList.add('hidden');
            }
        });

        async function loadProfile(uid) {
            onSnapshot(doc(db, "users", uid), s => {
                const d = s.data();
                const tik = d.isVerified ? '<span class="verified-badge">✔</span>' : '';
                document.getElementById('p-name').innerHTML = d.username + tik;
                document.getElementById('p-balance').innerText = `₺${d.balance || 0}`;
                document.getElementById('p-guild').innerHTML = d.guild ? `<span class="guild-tag">[${d.guild}]</span>` : "";
            });
        }

        // POST ACTIONS
        window.post = async () => {
            const t = document.getElementById('up-text').value, pr = document.getElementById('price-box').value;
            if(!t && !curImg) return;
            const uSnap = await getDoc(doc(db, "users", auth.currentUser.uid));
            const uD = uSnap.data();
            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid, user: auth.currentUser.displayName, text: t, image: curImg, price: pr,
                guild: uD.guild || "", isVerified: uD.isVerified || false, isBoosted: false,
                likes: 0, comments: [], time: serverTimestamp()
            });
            window.switchTab('home');
            curImg = ""; 
            document.getElementById('up-prev').classList.add('hidden');
            document.getElementById('drop-area').classList.remove('hidden');
            document.getElementById('up-text').value = "";
        };

        window.likePost = async (id, current) => {
            await updateDoc(doc(db, "posts", id), { likes: (current || 0) + 1 });
        };

        window.addComment = async (id) => {
            const msg = prompt("Yorumunuz:");
            if(!msg) return;
            const pRef = doc(db, "posts", id);
            const pSnap = await getDoc(pRef);
            const cmts = pSnap.data().comments || [];
            await updateDoc(pRef, { comments: [...cmts, { user: auth.currentUser.displayName, text: msg }] });
        };

        // FEED & KESFET LISTENER
        function listenFeed() {
            const qFeed = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(qFeed, (snap) => {
                const feed = document.getElementById('feed');
                const search = document.getElementById('search-results');
                feed.innerHTML = ""; search.innerHTML = "";
                
                snap.forEach(d => {
                    const p = d.data();
                    const isV = p.isVerified ? '<span class="verified-badge">✔</span>' : '';
                    const vipClass = p.isBoosted ? 'vip-username' : '';
                    
                    // FEED HTML
                    feed.innerHTML += `
                        <div class="post ${p.isBoosted ? 'boosted':''}">
                            <div style="padding:12px; display:flex; align-items:center;">
                                <b class="${vipClass}">${p.user}</b> ${isV} ${p.guild ? `<span class="guild-tag">[${p.guild}]</span>`:''}
                            </div>
                            <div class="post-img-container">
                                ${p.price ? `<div class="price-tag">${p.price} Won</div>`:''}
                                ${p.image ? `<img src="${p.image}">` : `<div style="color:white; padding:20px;">${p.text}</div>`}
                            </div>
                            <div class="post-actions">
                                <span class="action-btn" onclick="window.likePost('${d.id}', ${p.likes})">❤️</span>
                                <span class="action-btn" onclick="window.addComment('${d.id}')">💬</span>
                                <span class="action-btn" onclick="window.openChat('${p.uid}', '${p.user}')">✈️</span>
                            </div>
                            <div style="padding:0 12px 12px;">
                                <div><b>${p.likes || 0} beğeni</b></div>
                                <div><b>${p.user}</b> ${p.text}</div>
                                <div class="comment-box">
                                    ${(p.comments || []).map(c => `<div><b>${c.user}</b> ${c.text}</div>`).join('')}
                                </div>
                            </div>
                        </div>`;

                    // KESFET GRID
                    if(p.image) {
                        const item = document.createElement('div');
                        item.className = 'grid-item';
                        item.style.backgroundImage = `url(${p.image})`;
                        item.onclick = () => window.switchTab('home');
                        search.appendChild(item);
                    }
                });
            });
        }

        // CHAT LOGIC
        window.openChat = (targetUid, targetName) => {
            if(targetUid === auth.currentUser.uid) return;
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chat-target').innerText = targetName;
            const myUid = auth.currentUser.uid;
            chatRef = myUid < targetUid ? `${myUid}_${targetUid}` : `${targetUid}_${myUid}`;
            
            onSnapshot(query(collection(db, "chats", chatRef, "messages"), orderBy("time", "asc")), s => {
                const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                s.forEach(m => {
                    const d = m.data();
                    box.innerHTML += `<div class="bubble ${d.sender === myUid ? 'right':'left'}">${d.msg}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendChat = async () => {
            const m = document.getElementById('chatIn').value;
            if(!m || !chatRef) return;
            await addDoc(collection(db, "chats", chatRef, "messages"), { 
                sender: auth.currentUser.uid, 
                msg: m, 
                time: serverTimestamp() 
            });
            document.getElementById('chatIn').value = "";
        };

        window.closeChat = () => document.getElementById('chat-window').classList.add('hidden');
        window.joinG = async () => { 
            const g = prompt("Yeni Lonca Adı (Örn: JINNO):"); 
            if(g) await updateDoc(doc(db, "users", auth.currentUser.uid), { guild: g.toUpperCase() }); 
        };

        function listenMessages() {
            onSnapshot(collection(db, "chats"), s => {
                const list = document.getElementById('msg-list'); list.innerHTML = "";
                s.forEach(d => {
                    if(d.id.includes(auth.currentUser.uid)) {
                        list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #eee; cursor:pointer;" onclick="window.openChat('${d.id.replace(auth.currentUser.uid,"").replace("_","")}','Sohbet')"><b>📩 Yeni Mesajlaşma</b><br><small>Sohbeti açmak için tıkla</small></div>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
