<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kapında - Supreme Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e67e22; --primary-dark: #d35400;
            --dark-bg: #0f172a; --card-bg: #1e293b;
            --accent: #38bdf8; --success: #22c55e;
            --danger: #ef4444; --warning: #f59e0b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border: #334155;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--dark-bg); margin: 0; color: var(--text-main); height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; height: 100vh; position: relative; display: flex; flex-direction: column; overflow: hidden; background: var(--dark-bg); }

        /* === HEADER === */
        .header { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .header h2 { margin: 0; font-size: 18px; color: var(--primary); font-weight: 800; letter-spacing: 1px; }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .screen { display: none; }
        .screen.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* === DASHBOARD KARTLARI (KÜÇÜK VE ŞIK) === */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card i { position: absolute; right: -5px; bottom: -5px; font-size: 40px; opacity: 0.1; color: var(--accent); }
        .stat-card span { font-size: 10px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; display: block; }
        .stat-card h2 { margin: 5px 0 0 0; font-size: 18px; color: var(--text-main); }

        /* === BUTTONS & INPUTS === */
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-action { background: var(--accent); color: var(--dark-bg); }
        .btn-danger { background: var(--danger); color: white; }
        
        .input-group { margin-bottom: 12px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: #1a2233; color: white; box-sizing: border-box; }

        /* === ADMIN ALT ODALAR (TABS) === */
        .admin-nav { display: flex; background: var(--card-bg); border-radius: 12px; padding: 5px; margin-bottom: 20px; border: 1px solid var(--border); }
        .admin-tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .admin-tab.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.4); }

        /* === ÜYE LİSTESİ (CRM) === */
        .user-card { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 4px solid var(--accent); transition: 0.3s; }
        .user-card:hover { border-left-color: var(--primary); transform: translateX(5px); }
        .user-info h4 { margin: 0; font-size: 14px; }
        .user-info p { margin: 3px 0; font-size: 10px; color: var(--text-muted); }
        .user-actions { display: flex; gap: 5px; margin-top: 10px; }
        .user-actions button { flex: 1; padding: 6px; font-size: 10px; }

        /* === BOTTOM NAV === */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: var(--card-bg); display: flex; border-top: 1px solid var(--border); padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        /* === MODAL === */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 85%; border-radius: 15px; padding: 20px; border: 1px solid var(--primary); }

        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 20px; border-radius: 10px; font-size: 12px; font-weight: bold; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="toast">İşlem Başarılı</div>

        <div class="modal" id="editModal">
            <div class="modal-content">
                <h3 style="margin-top:0; color:var(--accent);">Kullanıcıyı Modifiye Et</h3>
                <input type="hidden" id="editEmail">
                <div class="input-group"><label style="font-size:10px; color:var(--text-muted);">AD SOYAD</label><input type="text" id="editName"></div>
                <div class="input-group"><label style="font-size:10px; color:var(--text-muted);">CÜZDAN BAKİYE (₺)</label><input type="number" id="editBalance" style="color:var(--success); font-weight:bold; font-size:18px;"></div>
                <div class="input-group"><label style="font-size:10px; color:var(--text-muted);">GİRİŞ ŞİFRESİ</label><input type="text" id="editPass" style="color:var(--danger);"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-primary" onclick="saveUserEdit()">Güncelle</button>
                    <button style="background:transparent; color:white; border:1px solid var(--border);" onclick="closeModal()">Kapat</button>
                </div>
            </div>
        </div>

        <div class="header" id="appHeader" style="display:none;">
            <h2><i class="fa-solid fa-bolt"></i> KAPINDA SUPREME</h2>
            <div style="display:flex; gap:15px; align-items:center;">
                <i class="fa-solid fa-bell" style="color:var(--text-muted);"></i>
                <div onclick="cikisYap()"><i class="fa-solid fa-power-off" style="color:var(--danger);"></i></div>
            </div>
        </div>

        <div class="content">
            <div id="authScreen" class="screen active" style="text-align: center; padding-top: 50px;">
                <div style="font-size: 60px; color: var(--primary); margin-bottom: 10px;"><i class="fa-solid fa-cube"></i></div>
                <h1 style="margin:0; letter-spacing:2px;">GİRİŞ</h1>
                <p style="color:var(--text-muted); font-size:11px; margin-bottom:30px;">Tanrı Modu: admin.com / 1</p>
                
                <div class="card" style="border-top: 3px solid var(--primary);">
                    <div class="input-group"><input type="text" id="loginEmail" placeholder="E-posta" value="admin.com"></div>
                    <div class="input-group"><input type="password" id="loginPass" placeholder="Şifre" value="1"></div>
                    <button class="btn-primary" onclick="girisYap()">KONTROLÜ ELE AL</button>
                </div>
            </div>

            <div id="customerScreen" class="screen">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0;">Pazaryeri</h3>
                    <span class="badge blue">Canlı Akış</span>
                </div>
                <div id="productGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            </div>

            <div id="adminScreen" class="screen">
                <div class="stat-grid">
                    <div class="stat-card">
                        <span>TOPLAM CİRO</span>
                        <h2 id="statCiro">0 ₺</h2>
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div class="stat-card">
                        <span>AKTİF ÜYELER</span>
                        <h2 id="statUsers">0</h2>
                        <i class="fa-solid fa-users"></i>
                    </div>
                </div>

                <div class="admin-nav">
                    <div class="admin-tab active" onclick="switchAdminRoom('crm', this)">Üye CRM</div>
                    <div class="admin-tab" onclick="switchAdminRoom('finance', this)">Finans</div>
                    <div class="admin-tab" onclick="switchAdminRoom('config', this)">Ayarlar</div>
                </div>

                <div id="room-crm" class="admin-room">
                    <div class="input-group"><input type="text" placeholder="Üye Ara..." onkeyup="searchUsers(this.value)"></div>
                    <div id="userListContainer"></div>
                </div>

                <div id="room-finance" class="admin-room" style="display:none;">
                    <div class="card">
                        <h4>Esnaf Alacakları</h4>
                        <div id="esnafBorcList"></div>
                    </div>
                </div>

                <div id="room-config" class="admin-room" style="display:none;">
                    <button class="btn-danger" onclick="fullSystemReset()"><i class="fa-solid fa-skull"></i> TÜM VERİLERİ SIFIRLA</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav" id="appNav" style="display:none;">
            <div class="nav-item active" id="nav-home" onclick="ekranDegistir('customerScreen'); navAktif(this);">
                <i class="fa-solid fa-house"></i><span>Vitrin</span>
            </div>
            <div class="nav-item" id="nav-admin" style="display:none;" onclick="ekranDegistir('adminScreen'); navAktif(this);">
                <i class="fa-solid fa-shield-halved"></i><span>Tanrı Modu</span>
            </div>
            <div class="nav-item" onclick="cikisYap()">
                <i class="fa-solid fa-right-from-bracket"></i><span>Çıkış</span>
            </div>
        </div>
    </div>

    <script>
        // 1. VERİTABANI VE İLK KURULUM
        function initDB() {
            if (!localStorage.getItem('kapinda_users')) {
                const users = {
                    'admin.com': { rol: 'admin', isim: 'Yönetici Hakan', sifre: '1', bakiye: 0, tarih: '12.03.2026' },
                    'esnaf@mail.com': { rol: 'store', isim: 'Umut Organik Market', sifre: '1', bakiye: 5400, tarih: '10.03.2026' },
                    'satici@mail.com': { rol: 'seller', isim: 'Ahmet Temsilci', sifre: '1', bakiye: 250, tarih: '11.03.2026' },
                    'musteri@mail.com': { rol: 'customer', isim: 'Canan Müşteri', sifre: '1', bakiye: 0, tarih: '13.03.2026' }
                };
                localStorage.setItem('kapinda_users', JSON.stringify(users));
                localStorage.setItem('kapinda_products', JSON.stringify([
                    {id:1, ad:'Zeytinyağı 5L', fiyat:1200, resim:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=200'},
                    {id:2, ad:'Organik Bal', fiyat:450, resim:'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=200'}
                ]));
                localStorage.setItem('kapinda_stats', JSON.stringify({ ciro: 25600 }));
            }
        }
        initDB();

        let aktifKullanici = null;

        function dbGet(key) { return JSON.parse(localStorage.getItem(key)); }
        function dbSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        // 2. GİRİŞ VE NAVİGASYON
        function girisYap() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const users = dbGet('kapinda_users');

            if(users[email] && users[email].sifre === pass) {
                aktifKullanici = email;
                document.getElementById('appHeader').style.display = 'flex';
                document.getElementById('appNav').style.display = 'flex';
                
                if(users[email].rol === 'admin') document.getElementById('nav-admin').style.display = 'block';
                
                ekranDegistir(users[email].rol === 'admin' ? 'adminScreen' : 'customerScreen');
                showToast("Sistem Hazır, Hoş Geldin.");
            } else { alert("Hatalı!"); }
        }

        function ekranDegistir(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'adminScreen') refreshAdminStats();
            if(id === 'customerScreen') drawProducts();
        }

        function navAktif(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // 3. TANRI MODU FONKSİYONLARI (SUPREME)
        function refreshAdminStats() {
            const users = dbGet('kapinda_users');
            const stats = dbGet('kapinda_stats');
            document.getElementById('statCiro').innerText = stats.ciro.toLocaleString() + " ₺";
            document.getElementById('statUsers').innerText = Object.keys(users).length;
            drawUserList();
            drawFinanceList();
        }

        function switchAdminRoom(room, el) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.admin-room').forEach(r => r.style.display = 'none');
            document.getElementById('room-' + room).style.display = 'block';
        }

        function drawUserList(filter = '') {
            const users = dbGet('kapinda_users');
            let html = '';
            for(let email in users) {
                const u = users[email];
                if(email.includes(filter) || u.isim.toLowerCase().includes(filter.toLowerCase())) {
                    html += `
                    <div class="user-card">
                        <div class="user-info">
                            <h4>${u.isim} <span style="font-size:8px; color:var(--primary);">[${u.rol.toUpperCase()}]</span></h4>
                            <p>${email}</p>
                            <p>Şifre: <b style="color:var(--danger);">${u.sifre}</b> | Bakiye: <b style="color:var(--success);">${u.bakiye} ₺</b></p>
                        </div>
                        <div class="user-actions">
                            <button class="btn-action" onclick="openEditModal('${email}')"><i class="fa-solid fa-pen"></i> Düzenle</button>
                            <button class="btn-danger" style="background:#440000;" onclick="deleteUser('${email}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
                }
            }
            document.getElementById('userListContainer').innerHTML = html;
        }

        function searchUsers(val) { drawUserList(val); }

        function drawFinanceList() {
            const users = dbGet('kapinda_users');
            let html = '';
            for(let e in users) {
                if(users[e].rol === 'store') {
                    html += `<div class="list-item"><span>${users[e].isim}</span><b>${users[e].bakiye} ₺</b></div>`;
                }
            }
            document.getElementById('esnafBorcList').innerHTML = html || 'Kayıtlı Esnaf Yok.';
        }

        // 4. MODAL İŞLEMLERİ (ANLIK VERİ ENJEKSİYONU)
        function openEditModal(email) {
            const u = dbGet('kapinda_users')[email];
            document.getElementById('editEmail').value = email;
            document.getElementById('editName').value = u.isim;
            document.getElementById('editBalance').value = u.bakiye;
            document.getElementById('editPass').value = u.sifre;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        function saveUserEdit() {
            const email = document.getElementById('editEmail').value;
            const users = dbGet('kapinda_users');
            users[email].isim = document.getElementById('editName').value;
            users[email].bakiye = parseFloat(document.getElementById('editBalance').value);
            users[email].sifre = document.getElementById('editPass').value;
            dbSet('kapinda_users', users);
            closeModal(); refreshAdminStats(); showToast("Kullanıcı Kodları Güncellendi.");
        }

        function deleteUser(email) {
            if(email === 'admin.com') return alert("Kurucu silinemez!");
            if(confirm("Bu varlığı sistemden silmek istediğine emin misin?")) {
                const users = dbGet('kapinda_users');
                delete users[email];
                dbSet('kapinda_users', users);
                refreshAdminStats();
            }
        }

        // 5. VİTRİN VE DİĞER
        function drawProducts() {
            const prods = dbGet('kapinda_products');
            let html = '';
            prods.forEach(p => {
                html += `
                <div class="card" style="padding:0; overflow:hidden;">
                    <img src="${p.resim}" style="width:100%; height:100px; object-fit:cover;">
                    <div style="padding:10px;">
                        <h4 style="margin:0; font-size:12px;">${p.ad}</h4>
                        <b style="color:var(--primary); font-size:14px;">${p.fiyat} ₺</b>
                        <button class="btn-primary" style="padding:5px; margin-top:5px; font-size:10px;" onclick="showToast('Sepete Eklendi')">Sepete Ekle</button>
                    </div>
                </div>`;
            });
            document.getElementById('productGrid').innerHTML = html;
        }

        function fullSystemReset() {
            if(confirm("TÜM İMPARATORLUK SIFIRLANACAK! Emin misin?")) {
                localStorage.clear(); location.reload();
            }
        }

        function cikisYap() { location.reload(); }
    </script>
</body>
</html>
