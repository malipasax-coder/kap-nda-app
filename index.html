<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2Social | PRO v9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #b71c1c; --blue: #0095f6; --bg: #fafafa; --border: #dbdbdb; --gold: #f1c40f; --green: #27ae60; --dark: #121212; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg); margin: 0; padding-bottom: 70px; color: #262626; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* HEADER */
        header { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 20px; position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); font-style: italic; letter-spacing: -1px; cursor:pointer; }
        
        .container { max-width: 500px; margin: 70px auto 0; padding: 10px 15px; }

        /* POST STYLES */
        .post { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 18px; overflow: hidden; transition: 0.3s; }
        .boosted { border: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2); }
        .vip-username { color: #d4af37; text-shadow: 0 0 3px rgba(212, 175, 55, 0.4); font-weight: 800; }
        .verified-badge { color: var(--blue); margin-left: 4px; font-size: 14px; }
        .guild-tag { background: var(--dark); color: var(--gold); font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--gold); margin-left: 5px; }
        
        .post-img-container { position: relative; width: 100%; background: #000; aspect-ratio: 1/1; display: flex; align-items: center; }
        .post-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { position: absolute; top: 15px; right: 15px; background: var(--gold); color: #000; padding: 6px 12px; border-radius: 20px; font-weight: 800; border: 2px solid #fff; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* INTERACTION */
        .post-actions { display: flex; gap: 18px; padding: 12px; font-size: 24px; border-bottom: 1px solid #f9f9f9; }
        .action-icon { cursor: pointer; transition: 0.2s; }
        .action-icon:hover { opacity: 0.7; transform: scale(1.1); }
        .comment-section { padding: 10px 12px; font-size: 13px; background: #fcfcfc; max-height: 120px; overflow-y: auto; }

        /* GRID / EXPLORE */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background-size: cover; background-position: center; cursor: pointer; }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-btn { cursor: pointer; font-size: 26px; color: #aaa; transition: 0.3s; }
        .active-nav { color: var(--primary); transform: translateY(-3px); }

        /* ADMIN & BUTTONS */
        .btn-prime { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        /* CHAT WINDOW */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #fff; z-index: 2000; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; font-weight: 800; }
        .chat-body { flex: 1; padding: 20px; background: #f0f2f5; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; }
        .bubble.right { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.left { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <section id="auth-screen">
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--dark);">
            <div class="card" style="width:340px; text-align:center;">
                <h1 style="color:var(--primary); font-style:italic; margin:0;">M2SOCIAL</h1>
                <p style="font-size:12px; margin-bottom:20px; color:#888;">Metin2 Topluluk Platformu v9.0</p>
                <form id="login-form" onsubmit="event.preventDefault(); window.login();">
                    <input type="email" id="email" placeholder="Email" required style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="password" id="pass" placeholder="Şifre" required style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
                    <button type="submit" class="btn-prime">GİRİŞ YAP</button>
                    <p onclick="window.toggleAuth()" style="font-size:12px; color:var(--blue); cursor:pointer; margin-top:15px;">Kayıt olmak için tıkla</p>
                </form>
                <form id="reg-form" class="hidden" onsubmit="event.preventDefault(); window.register();">
                    <input type="text" id="rUser" placeholder="Kullanıcı Adı" required style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="email" id="rEmail" placeholder="Email" required style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
                    <input type="password" id="rPass" placeholder="Şifre (Min 6)" required style="width:100%; padding:12px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
                    <button type="submit" class="btn-prime">KAYIT OL</button>
                    <p onclick="window.toggleAuth()" style="font-size:12px; color:var(--blue); cursor:pointer; margin-top:15px;">Giriş ekranına dön</p>
                </form>
            </div>
        </div>
    </section>

    <div id="user-app" class="hidden">
        <header>
            <div class="logo">M2SOCIAL</div>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="admin-badge" class="hidden" style="background:var(--primary); color:white; font-size:10px; padding:3px 6px; border-radius:4px;">ADM</span>
                <span onclick="window.switchTab('msgs')" style="cursor:pointer; font-size:22px;">✉️</span>
                <span onclick="window.logout()" style="cursor:pointer; font-size:20px;">Logout</span>
            </div>
        </header>

        <main id="view-home" class="container view-section"><div id="feed"></div></main>

        <main id="view-search" class="container view-section hidden">
            <h3 style="margin-top:0;">✨ Keşfet</h3>
            <div id="explore-grid" class="grid"></div>
        </main>

        <main id="view-up" class="container view-section hidden">
            <div class="card">
                <h3>Yeni Paylaşım</h3>
                <div id="drop-area" onclick="document.getElementById('fileIn').click()" style="border:2px dashed #ccc; padding:40px; text-align:center; cursor:pointer; border-radius:15px;">
                    📸 Resim Yükle
                </div>
                <img id="up-prev" class="hidden" style="width:100%; margin-top:10px; border-radius:10px;">
                <input type="file" id="fileIn" class="hidden" onchange="window.preview(this)" accept="image/*">
                <textarea id="up-text" placeholder="Bir şeyler yaz..." style="width:100%; height:80px; margin-top:10px; border:1px solid #eee; padding:10px; border-radius:8px;"></textarea>
                <div style="margin:10px 0;">
                    <label><input type="checkbox" id="up-trade" onchange="document.getElementById('price-box').classList.toggle('hidden')"> 💰 Satılık Eşya (Won)</label>
                </div>
                <input type="number" id="price-box" class="hidden" placeholder="Fiyat (Won)" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
                <button class="btn-prime" onclick="window.post()">PAYLAŞ</button>
            </div>
        </main>

        <main id="view-msgs" class="container view-section hidden">
            <h3>Mesajlar</h3>
            <div id="msg-list"></div>
        </main>

        <main id="view-prof" class="container view-section hidden">
            <div class="card" style="text-align:center;">
                <img id="p-img" src="https://via.placeholder.com/80" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                <h2 id="p-name">...</h2>
                <div id="p-guild"></div>
                <div style="display:flex; justify-content:space-around; margin-top:20px;">
                    <div><b id="p-balance">₺0</b><br><small>Bakiye</small></div>
                    <div><b id="p-followers">0</b><br><small>Takipçi</small></div>
                </div>
                <button class="btn-prime" style="background:var(--gold); color:#000;" onclick="window.joinG()">LONCA AYARLARI</button>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-btn active-nav" onclick="window.switchTab('home', this)">🏠</div>
            <div class="nav-btn" onclick="window.switchTab('search', this)">🔍</div>
            <div class="nav-btn" onclick="window.switchTab('up', this)">➕</div>
            <div class="nav-btn" onclick="window.switchTab('prof', this)">👤</div>
        </nav>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <span onclick="window.closeChat()" style="cursor:pointer; font-size:24px;">←</span>
            <div id="chat-target">Kullanıcı</div>
        </div>
        <div id="chat-msgs" class="chat-body"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#fff; border-top:1px solid #eee;">
            <input type="text" id="chatIn" placeholder="Mesaj..." style="flex:1; padding:12px; border-radius:25px; border:1px solid #ddd;">
            <button onclick="window.sendChat()" style="color:var(--blue); border:none; background:none; font-weight:bold; cursor:pointer;">GÖNDER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDoc, updateDoc, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWSlha9fD_q3zHXaRJ3ocJdtALqkrW-LU",
            authDomain: "kapinda-8d3ef.firebaseapp.com",
            projectId: "kapinda-8d3ef",
            storageBucket: "kapinda-8d3ef.firebasestorage.app",
            messagingSenderId: "246456710881",
            appId: "1:246456710881:web:1d27f666a6c0dab01829a0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curImg = ""; let chatRef = ""; let isAdmin = false;

        window.toggleAuth = () => { document.getElementById('login-form').classList.toggle('hidden'); document.getElementById('reg-form').classList.toggle('hidden'); };
        window.switchTab = (t, e) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            if(e) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav')); e.classList.add('active-nav'); }
        };

        // IMAGE HANDLER
        window.preview = (i) => {
            if(i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = Math.min(800 / img.width, 800 / img.height);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        curImg = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('up-prev').src = curImg;
                        document.getElementById('up-prev').classList.remove('hidden');
                        document.getElementById('drop-area').classList.add('hidden');
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        };

        // AUTH
        window.login = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); }
            catch { alert("Hata: Bilgileri kontrol et."); }
        };

        window.register = async () => {
            const u = document.getElementById('rUser').value, e = document.getElementById('rEmail').value, p = document.getElementById('rPass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: u });
                await setDoc(doc(db, "users", res.user.uid), { username: u, balance: 0, guild: "", isVerified: false, role: 'user', followers: 0 });
            } catch (err) { alert(err.message); }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('user-app').classList.remove('hidden');
                const uDoc = await getDoc(doc(db, "users", u.uid));
                if(uDoc.exists() && uDoc.data().role === 'admin') { isAdmin = true; document.getElementById('admin-badge').classList.remove('hidden'); }
                loadProfile(u.uid); listenFeed(); listenMessages();
            } else { document.getElementById('auth-screen').classList.remove('hidden'); }
        });

        async function loadProfile(uid) {
            onSnapshot(doc(db, "users", uid), s => {
                const d = s.data();
                document.getElementById('p-name').innerHTML = d.username + (d.isVerified ? '<span class="verified-badge">✔</span>' : '');
                document.getElementById('p-balance').innerText = `₺${d.balance || 0}`;
                document.getElementById('p-followers').innerText = d.followers || 0;
                document.getElementById('p-guild').innerHTML = d.guild ? `<span class="guild-tag">[${d.guild}]</span>` : "Lonca Yok";
            });
        }

        // POSTS
        window.post = async () => {
            if(!curImg && !document.getElementById('up-text').value) return;
            const uSnap = await getDoc(doc(db, "users", auth.currentUser.uid));
            const uD = uSnap.data();
            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid, user: auth.currentUser.displayName, 
                text: document.getElementById('up-text').value, image: curImg, 
                price: document.getElementById('price-box').value, guild: uD.guild || "",
                isVerified: uD.isVerified || false, isBoosted: false, likes: 0, comments: [], time: serverTimestamp()
            });
            location.reload();
        };

        window.like = async (id, current) => { await updateDoc(doc(db, "posts", id), { likes: current + 1 }); };
        window.comment = async (id) => {
            const txt = prompt("Yorumun:"); if(!txt) return;
            const pRef = doc(db, "posts", id);
            const pSnap = await getDoc(pRef);
            await updateDoc(pRef, { comments: [...pSnap.data().comments, { u: auth.currentUser.displayName, t: txt }] });
        };

        window.deletePost = async (id) => { if(confirm("Silinsin mi?")) await deleteDoc(doc(db, "posts", id)); };

        function listenFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                const feed = document.getElementById('feed');
                const explore = document.getElementById('explore-grid');
                feed.innerHTML = ""; explore.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const vTik = p.isVerified ? '<span class="verified-badge">✔</span>' : '';
                    const vip = p.isBoosted ? 'vip-username' : '';
                    
                    feed.innerHTML += `
                        <div class="post ${p.isBoosted ? 'boosted' : ''}">
                            <div style="padding:12px; display:flex; justify-content:space-between; align-items:center;">
                                <div><b class="${vip}">${p.user}</b> ${vTik} ${p.guild ? `<span class="guild-tag">[${p.guild}]</span>` : ''}</div>
                                ${isAdmin ? `<button onclick="window.deletePost('${d.id}')" style="border:none; color:red; background:none;">Sil</button>` : ''}
                            </div>
                            <div class="post-img-container">
                                ${p.price ? `<div class="price-tag">${p.price} Won</div>` : ''}
                                ${p.image ? `<img src="${p.image}">` : `<div style="padding:20px; color:white;">${p.text}</div>`}
                            </div>
                            <div class="post-actions">
                                <span class="action-icon" onclick="window.like('${d.id}', ${p.likes || 0})">❤️</span>
                                <span class="action-icon" onclick="window.comment('${d.id}')">💬</span>
                                <span class="action-icon" onclick="window.openChat('${p.uid}', '${p.user}')">✈️</span>
                            </div>
                            <div style="padding:0 12px 12px;">
                                <div><b>${p.likes || 0} beğeni</b></div>
                                <div style="margin-top:5px;"><b>${p.user}</b> ${p.text}</div>
                                <div class="comment-section">
                                    ${p.comments.map(c => `<div><b>${c.u}</b> ${c.t}</div>`).join('')}
                                </div>
                            </div>
                        </div>`;
                    
                    if(p.image) {
                        const item = document.createElement('div');
                        item.className = "grid-item"; item.style.backgroundImage = `url(${p.image})`;
                        item.onclick = () => window.switchTab('home');
                        explore.appendChild(item);
                    }
                });
            });
        }

        // CHAT
        window.openChat = (targetUid, targetName) => {
            if(targetUid === auth.currentUser.uid) return;
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chat-target').innerText = targetName;
            const myUid = auth.currentUser.uid;
            chatRef = myUid < targetUid ? `${myUid}_${targetUid}` : `${targetUid}_${myUid}`;
            onSnapshot(query(collection(db, "chats", chatRef, "messages"), orderBy("time", "asc")), s => {
                const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                s.forEach(m => { const d = m.data(); box.innerHTML += `<div class="bubble ${d.sender === myUid ? 'right' : 'left'}">${d.msg}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendChat = async () => {
            const m = document.getElementById('chatIn').value; if(!m || !chatRef) return;
            await addDoc(collection(db, "chats", chatRef, "messages"), { sender: auth.currentUser.uid, msg: m, time: serverTimestamp() });
            await setDoc(doc(db, "chats", chatRef), { last: serverTimestamp(), users: chatRef.split('_') }, { merge: true });
            document.getElementById('chatIn').value = "";
        };

        window.closeChat = () => document.getElementById('chat-window').classList.add('hidden');
        window.joinG = async () => { const g = prompt("Lonca Adı:"); if(g) await updateDoc(doc(db, "users", auth.currentUser.uid), { guild: g.toUpperCase() }); };

        function listenMessages() {
            onSnapshot(query(collection(db, "chats"), where("users", "array-contains", auth.currentUser.uid)), s => {
                const list = document.getElementById('msg-list'); list.innerHTML = "";
                s.forEach(d => {
                    list.innerHTML += `<div class="card" style="cursor:pointer;" onclick="window.openChat('${d.id.replace(auth.currentUser.uid,"").replace("_","")}', 'Sohbet')">💬 Aktif Sohbet<br><small>Mesajları görmek için tıkla</small></div>`;
                });
            });
        }
    </script>
</body>
</html>
